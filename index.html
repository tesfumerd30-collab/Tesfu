<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ኢትዮጵያ ዳማ - 100% PRO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --bg: #182533; --board-dark: #8b5a38; --board-light: #b58863; }
  body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin: 0; padding: 10px; }
  .controls { display: flex; gap: 5px; margin-bottom: 10px; }
  input { padding: 8px; font-size: 14px; border-radius: 5px; border: none; text-align: center; }
  button { padding: 8px 15px; font-size: 14px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; }
  #status-box { padding: 10px; background: rgba(0,0,0,0.3); border-radius: 5px; margin-bottom: 10px; font-weight: bold; }
  #board { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); border: 4px solid #2c3e50; }
  .cell { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; position: relative; }
  .dark { background: var(--board-dark); }
  .light { background: var(--board-light); }
  .piece { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; z-index: 2; }
  .red { background: #c0392b; }
  .black { background: #1c2833; }
  .king { border: 2px solid #f1c40f; }
  .selected { outline: 3px solid #3498db; }
  .hint { position: absolute; width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; z-index: 1; }
</style>
</head>
<body>

<div class="controls">
  <input id="room" placeholder="ክፍል ስም">
  <button onclick="joinRoom()">Join</button>
</div>
<div id="status-box">ክፍል ስም አስገብተው Join ይበሉ</div>
<div id="board"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

window.Telegram.WebApp.expand();
const db = getDatabase(initializeApp({
  apiKey: "AIzaSyBSnabQTvelViDZZvYLLuHeHJQXnYJ4KLQ",
  databaseURL: "https://tesfuweb-default-rtdb.firebaseio.com",
  projectId: "tesfuweb",
}));

let myUid = Math.random().toString(36).substring(7);
let myColor = 0, roomId = null, gameState = null, selected = null, possibleMoves = [];

function initBoard(){ return Array(8).fill().map((_,r)=> Array(8).fill().map((_,c)=> (r+c)%2 ? (r<3?2:(r>4?1:0)) : 0 )); }

window.joinRoom = async () => {
  roomId = document.getElementById("room").value.trim();
  if(!roomId) return;
  const roomRef = ref(db, "rooms/" + roomId);
  await runTransaction(roomRef, (data) => {
    if (!data) return { board: initBoard(), turn: 1, players: { 1: myUid }, status: 'playing', chainR: -1 };
    if (!data.players) data.players = {};
    if (!data.players[1]) data.players[1] = myUid;
    else if (!data.players[2] && data.players[1] !== myUid) data.players[2] = myUid;
    return data;
  });

  onValue(roomRef, (snap) => {
    gameState = snap.val();
    if (!gameState) return;
    myColor = (gameState.players[1] === myUid) ? 1 : ((gameState.players[2] === myUid) ? 2 : 0);
    render();
    document.getElementById("status-box").innerText = (myColor ? "ተጫዋች " + myColor : "ተመልካች") + " | ተራ: " + gameState.turn;
  });
};

function render() {
  const b = document.getElementById("board");
  b.innerHTML = "";
  gameState.board.forEach((row, r) => row.forEach((val, c) => {
    let cell = document.createElement("div");
    cell.className = "cell " + ((r+c)%2 ? "dark" : "light");
    if (val !== 0) {
      let p = document.createElement("div");
      p.className = "piece " + (val%2 ? "red" : "black") + (val > 2 ? " king" : "");
      cell.appendChild(p);
    }
    b.appendChild(cell);
  }));
}
</script>
</body>
</html>
