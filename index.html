<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ኢትዮጵያ ዳማ - 100% PRO</title>
<style>
  :root { --bg: #182533; --board-dark: #8b5a38; --board-light: #b58863; }
  body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin: 0; padding: 20px; }
  .controls { display: flex; gap: 10px; margin-bottom: 15px; }
  input { padding: 10px; font-size: 16px; border-radius: 8px; text-align: center; border: none; outline: none; }
  button { padding: 10px 20px; font-size: 16px; font-weight: bold; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { background: #27ae60; }
  #status-box { padding: 10px 20px; background: rgba(0,0,0,0.3); border-radius: 8px; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
  #toast { position: fixed; top: 20px; background: #e74c3c; color: white; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 1000; }
  
  #board { display: grid; grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px); border: 5px solid #2c3e50; background: var(--board-light); border-radius: 4px; }
  .cell { width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; position: relative; }
  .dark { background: var(--board-dark); }
  .light { background: var(--board-light); }
  
  .piece { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; box-shadow: 0px 4px 6px rgba(0,0,0,0.4); z-index: 2; transition: 0.2s; }
  .red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b); }
  .black { background: radial-gradient(circle at 30% 30%, #5d6d7e, #1c2833); }
  .king { border: 3px solid #f1c40f; }
  .selected { outline: 3px solid #3498db; outline-offset: 2px; }
  .chain-active { outline: 3px solid #f39c12; outline-offset: 2px; animation: pulse 1s infinite; }
  .hint { position: absolute; width: 14px; height: 14px; background: rgba(46, 204, 113, 0.7); border-radius: 50%; z-index: 1; cursor: pointer; }
  .hint-capture { background: rgba(231, 76, 60, 0.8); }

  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<div id="toast">መልእክት</div>
<h2>ኢትዮጵያ ዳማ PRO</h2>
<div class="controls">
  <input id="room" placeholder="የክፍል ስም (Room)">
  <button onclick="joinRoom()">Join Room</button>
</div>
<div id="status-box">ክፍል ስም ያስገቡ</div>
<div id="board"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, onDisconnect } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

const app = initializeApp({
  /* 🔴 YOUR FIREBASE CONFIG HERE */
  apiKey: "AIzaSyBSnabQTvelViDZZvYLLuHeHJQXnYJ4KLQ",
  databaseURL: "https://tesfuweb-default-rtdb.firebaseio.com",
  projectId: "tesfuweb",
});
const db = getDatabase(app);

// Local User ID generation for this session (Security)
const myUid = Math.random().toString(36).substring(2, 15);

let roomId, roomRef, playerRef;
let myColor = 0; // 1 = Red, 2 = Black, 0 = Spectator
let gameState = null;
let selectedPiece = null;
let possibleMoves = [];

function initBoard(){
  return Array(8).fill().map((_,r)=>
    Array(8).fill().map((_,c)=> (r+c)%2 ? (r<3?2:(r>4?1:0)) : 0 )
  );
}

function showToast(msg, color = "#e74c3c") {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = color;
  t.style.opacity = "1";
  setTimeout(() => t.style.opacity = "0", 3000);
}

window.joinRoom = async () => {
  roomId = document.getElementById("room").value.trim();
  if(!roomId) return;
  
  roomRef = ref(db, "rooms/" + roomId);

  await runTransaction(roomRef, (data) => {
    if (!data) {
      return { 
        board: initBoard(), turn: 1, 
        players: { 1: myUid }, chainR: -1, chainC: -1, status: 'playing' 
      };
    }
    if (!data.players) data.players = {};
    if (data.players[1] === myUid || data.players[2] === myUid) return data; // Reconnect
    
    if (!data.players[1]) { data.players[1] = myUid; }
    else if (!data.players[2]) { data.players[2] = myUid; }
    
    return data;
  });

  onValue(roomRef, (snap) => {
    const data = snap.val();
    if(!data) { showToast("ክፍሉ ተዘግቷል!"); return; } // Null Guard
    
    // Deep copy to prevent mutation bugs
    gameState = structuredClone(data);
    
    // Determine Color safely based on UID mapping
    if (gameState.players && gameState.players[1] === myUid) myColor = 1;
    else if (gameState.players && gameState.players[2] === myUid) myColor = 2;
    else myColor = 0; // Spectator

    // onDisconnect fix: remove only MY player slot
    if (myColor > 0) {
      playerRef = ref(db, `rooms/${roomId}/players/${myColor}`);
      onDisconnect(playerRef).remove();
    }

    if (gameState.turn !== myColor) selectedPiece = null; 
    possibleMoves = [];
    updateStatus();
    render();
  });
};

function updateStatus() {
  const box = document.getElementById("status-box");
  if (gameState.status === 'draw') { box.innerText = "🤝 አቻ (Draw/Stalemate)!"; return; }
  if (gameState.status === 'win-1') { box.innerText = "🏆 ቀይ አሸነፈ!"; return; }
  if (gameState.status === 'win-2') { box.innerText = "🏆 ጥቁር አሸነፈ!"; return; }
  
  if (myColor === 0) { box.innerText = "👁️ እየተመለከቱ ነው"; return; }
  
  let pName = myColor === 1 ? "🔴" : "⚫";
  box.innerText = gameState.turn === myColor ? `${pName} ተራዎ ነው!` : `${pName} እየጠበቁ ነው...`;
}

// ---- Game Logic (Moves & Win State) ----
function isEnemy(p1, p2) { return p1 !== 0 && p2 !== 0 && (p1 % 2) !== (p2 % 2); }

function getValidMoves(r, c, board) {
  let piece = board[r][c];
  if(piece === 0) return [];
  let isKing = piece > 2;
  let forward = (piece % 2 !== 0) ? -1 : 1;
  let moves = [];
  let dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];

  for (let [dr, dc] of dirs) {
    let isFwd = (dr === forward);
    let step = 1, foundEnemy = null;
    
    while(true) {
      let nr = r + dr * step, nc = c + dc * step;
      if (nr < 0 || nr > 7 || nc < 0 || nc > 7) break;
      let target = board[nr][nc];
      
      if (target === 0) {
        if (foundEnemy) {
          moves.push({ tr: nr, tc: nc, capR: foundEnemy.r, capC: foundEnemy.c, isCap: true });
          if(!isKing) break;
        } else {
          if (isKing || isFwd) moves.push({ tr: nr, tc: nc, capR: null, capC: null, isCap: false });
          if(!isKing) break;
        }
      } else if (isEnemy(piece, target)) {
        if (foundEnemy) break;
        foundEnemy = { r: nr, c: nc };
      } else break;
      step++;
    }
  }
  return moves;
}

function hasAnyCapture(color, board) {
  for(let r=0; r<8; r++) {
    for(let c=0; c<8; c++) {
      let p = board[r][c];
      if (p !== 0 && p % 2 === color % 2) {
        if (getValidMoves(r, c, board).some(m => m.isCap)) return true;
      }
    }
  }
  return false;
}

function checkGameEnd(board, currentTurn) {
  let hasMoves = false;
  let enemyCount = 0;
  
  for(let r=0; r<8; r++) {
    for(let c=0; c<8; c++) {
      let p = board[r][c];
      if (p !== 0 && p % 2 === currentTurn % 2) {
        if (getValidMoves(r, c, board).length > 0) hasMoves = true;
      }
      if (p !== 0 && p % 2 !== currentTurn % 2) enemyCount++;
    }
  }
  
  if (enemyCount === 0) return currentTurn === 1 ? 'win-1' : 'win-2'; // All enemies eaten
  if (!hasMoves) return 'draw'; // Stalemate (No valid moves)
  return 'playing';
}

// ---- Interaction ----
window.handleCell = (r, c) => {
  if (myColor === 0 || gameState.status !== 'playing') return;
  if (gameState.turn !== myColor) return showToast("የእርስዎ ተራ አይደለም!");

  let val = gameState.board[r][c];

  if (val === 0 && selectedPiece) {
    let move = possibleMoves.find(m => m.tr === r && m.tc === c);
    if (move) executeMove(selectedPiece.r, selectedPiece.c, move);
    else showToast("ህገወጥ እንቅስቃሴ!");
    return;
  }

  if (val !== 0 && val % 2 === myColor % 2) {
    if (gameState.chainR !== -1 && (gameState.chainR !== r || gameState.chainC !== c)) {
      return showToast("ግዴታ በተከታታይ መብላት አለብዎት!");
    }

    let rawMoves = getValidMoves(r, c, gameState.board);
    let globalCap = hasAnyCapture(myColor, gameState.board);
    
    if (globalCap) {
      possibleMoves = rawMoves.filter(m => m.isCap);
      if (possibleMoves.length === 0) return showToast("Forced Capture: ሌላ ቦታ መብላት አለብዎት!");
    } else {
      possibleMoves = rawMoves;
    }

    selectedPiece = { r, c };
    render();
  }
};

function executeMove(fr, fc, move) {
  runTransaction(roomRef, (data) => {
    if(!data || data.turn !== myColor || data.status !== 'playing') return;
    
    let piece = data.board[fr][fc];
    data.board[move.tr][move.tc] = piece;
    data.board[fr][fc] = 0;
    
    if (move.isCap) data.board[move.capR][move.capC] = 0;
    
    let promoted = false;
    if (piece === 1 && move.tr === 0) { data.board[move.tr][move.tc] = 3; promoted = true; }
    if (piece === 2 && move.tr === 7) { data.board[move.tr][move.tc] = 4; promoted = true; }
    
    let canChain = false;
    if (move.isCap && !promoted) {
      if (getValidMoves(move.tr, move.tc, data.board).some(m => m.isCap)) canChain = true;
    }
    
    if (canChain) {
      data.chainR = move.tr; data.chainC = move.tc;
    } else {
      data.chainR = -1; data.chainC = -1;
      data.turn = data.turn === 1 ? 2 : 1;
      data.status = checkGameEnd(data.board, data.turn); // Check if next player can move
    }
    
    return data;
  });
}

function render() {
  if(!gameState) return;
  const b = document.getElementById("board");
  b.innerHTML = "";

  for(let r=0; r<8; r++) {
    for(let c=0; c<8; c++) {
      let cell = document.createElement("div");
      cell.className = "cell " + ((r+c)%2 ? "dark" : "light");
      cell.onclick = () => handleCell(r, c);

      let v = gameState.board[r][c];
      if (v !== 0) {
        let p = document.createElement("div");
        p.className = "piece " + (v%2 ? "red" : "black");
        if (v > 2) p.classList.add("king");
        
        if (selectedPiece && selectedPiece.r === r && selectedPiece.c === c) p.classList.add("selected");
        if (gameState.chainR === r && gameState.chainC === c) p.classList.add("chain-active");
        cell.appendChild(p);
      }
      
      let hint = possibleMoves.find(m => m.tr === r && m.tc === c);
      if (hint) {
        let h = document.createElement("div");
        h.className = "hint " + (hint.isCap ? "hint-capture" : "");
        cell.appendChild(h);
      }
      b.appendChild(cell);
    }
  }
}
// Initial empty board
document.getElementById("board").innerHTML = initBoard().map((row, r) => 
  row.map((_, c) => `<div class="cell ${(r+c)%2 ? 'dark':'light'}"></div>`).join('')
).join('');
</script>
</body>
</html>
